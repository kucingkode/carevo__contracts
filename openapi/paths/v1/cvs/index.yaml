get:
  tags: [Cv]
  operationId: getCv

  security:
    - bearerAuth: []

  responses:
    "200":
      description: Request successful
      headers:
        x-request-id:
          $ref: "../../../components/headers.yaml#/RequestID"
      content:
        application/json:
          schema:
            allOf:
              - $ref: "../../../components/schemas/CvBase.yaml"
              - required:
                  - userId
                  - personalInformation
                  - skills
                  - educations
                  - workExperiences
                  - courses
                  - organizations
                  - certifications

    "400":
      $ref: "../../../components/responses.yaml#/ValidationError"
    "401":
      $ref: "../../../components/responses.yaml#/Unauthorized"
    "429":
      $ref: "../../../components/responses.yaml#/RateLimit"
    "500":
      $ref: "../../../components/responses.yaml#/InternalServerError"

patch:
  tags: [Cv]
  operationId: updateCv

  security:
    - bearerAuth: []

  requestBody:
    required: true
    content:
      application/json:
        schema:
          allOf:
            - $ref: "../../../components/schemas/CvBase.yaml"
            - required:
                - userId

  responses:
    "200":
      description: Request successful
      headers:
        x-request-id:
          $ref: "../../../components/headers.yaml#/RequestID"

    "400":
      $ref: "../../../components/responses.yaml#/ValidationError"
    "401":
      $ref: "../../../components/responses.yaml#/Unauthorized"
    "429":
      $ref: "../../../components/responses.yaml#/RateLimit"
    "500":
      $ref: "../../../components/responses.yaml#/InternalServerError"
