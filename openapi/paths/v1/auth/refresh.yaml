post:
  tags: [Auth]
  operationId: refreshToken
  summary: |
    [refreshToken] Refresh token

  security:
    - bearerAuth: []

  parameters:
    - $ref: "../../../components/parameters.yaml#/RefreshCookie"

  responses:
    "200":
      description: Access token refreshed successfully
      headers:
        x-request-id:
          $ref: "../../../components/headers.yaml#/RequestID"
        Set-Cookie:
          $ref: "../../../components/headers.yaml#/RefreshCookie"
      content:
        application/json:
          schema:
            type: object
            required: [accessToken]
            properties:
              accessToken:
                type: string
                example: eyJhbGciOiJIUzI1NiJ9...

    "400":
      $ref: "../../../components/responses.yaml#/ValidationError"
    "401":
      $ref: "../../../components/responses.yaml#/Unauthorized"
    "429":
      $ref: "../../../components/responses.yaml#/RateLimit"
    "500":
      $ref: "../../../components/responses.yaml#/InternalServerError"
