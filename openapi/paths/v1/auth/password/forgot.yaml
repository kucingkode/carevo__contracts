post:
  tags: [Auth]
  operationId: sendPasswordResetEmail
  summary: |
    [sendPasswordResetEmail] Request password reset token
  description: |
    Send reset password token to the user's email address.
    Previous token will be invalidated and a new one will be issued.

  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          required: [email]
          properties:
            email:
              type: string
              format: email
              example: user@example.com

  responses:
    "200":
      description: Reset password email sent
      headers:
        x-request-id:
          $ref: "../../../../components/headers.yaml#/RequestID"
      content:
        application/json:
          schema:
            type: object
            required: [message]
            properties:
              message:
                type: string
                example: If this email is registered and verified, a new verification link will be sent

    "400":
      $ref: "../../../../components/responses.yaml#/ValidationError"
    "401":
      $ref: "../../../../components/responses.yaml#/Unauthorized"
    "429":
      $ref: "../../../../components/responses.yaml#/RateLimit"
    "500":
      $ref: "../../../../components/responses.yaml#/InternalServerError"
