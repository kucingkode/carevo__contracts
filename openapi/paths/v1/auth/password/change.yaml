post:
  tags: [Auth]
  operationId: changeUserPassword
  summary: |
    [changeUserPassword] Change user password

  security:
    - bearerAuth: []

  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          required: [oldPassword, newPassword]
          properties:
            oldPassword:
              type: string
              minLength: 8
              maxLength: 128
              example: WeakPassword123
            newPassword:
              type: string
              minLength: 8
              maxLength: 128
              example: StrongPassword123

  responses:
    "200":
      description: Password changed successfully
      headers:
        x-request-id:
          $ref: "../../../../components/headers.yaml#/RequestID"
      content:
        application/json:
          schema:
            type: object
            required: [message]
            properties:
              message:
                type: string
                example: Password change successful

    "401":
      description: Unauthorized
      headers:
        x-request-id:
          $ref: "../../../../components/headers.yaml#/RequestID"
      content:
        application/json:
          schema:
            allOf:
              - $ref: "../../../../components/schemas/ErrorResponse.yaml"
              - properties:
                  error:
                    enum: [UNAUTHORIZED]
                    example: UNAUTHORIZED

    "400":
      description: Validation error
      headers:
        x-request-id:
          $ref: "../../../../components/headers.yaml#/RequestID"
      content:
        application/json:
          schema:
            $ref: "../../../../components/schemas/ValidationErrorResponse.yaml"

    "429":
      description: Too many attempts
      headers:
        x-request-id:
          $ref: "../../../../components/headers.yaml#/RequestID"
      content:
        application/json:
          schema:
            $ref: "../../../../components/schemas/RateLimitErrorResponse.yaml"

    "500":
      description: Internal server error
      headers:
        x-request-id:
          $ref: "../../../../components/headers.yaml#/RequestID"
      content:
        application/json:
          schema:
            $ref: "../../../../components/schemas/RateLimitErrorResponse.yaml"
