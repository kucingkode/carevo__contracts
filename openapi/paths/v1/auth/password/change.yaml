post:
  tags: [Auth]
  operationId: changeUserPassword
  summary: |
    [changeUserPassword] Change user password

  security:
    - bearerAuth: []

  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          required: [oldPassword, newPassword]
          properties:
            oldPassword:
              type: string
              minLength: 8
              maxLength: 128
              example: WeakPassword123
            newPassword:
              type: string
              minLength: 8
              maxLength: 128
              example: StrongPassword123

  responses:
    "200":
      description: Password changed successfully
      headers:
        x-request-id:
          $ref: "../../../../components/headers.yaml#/RequestID"
      content:
        application/json:
          schema:
            type: object
            required: [message]
            properties:
              message:
                type: string
                example: Password change successful

    "400":
      $ref: "../../../../components/responses.yaml#/ValidationError"
    "401":
      $ref: "../../../../components/responses.yaml#/Unauthorized"
    "403":
      $ref: "../../../../components/responses.yaml#/Forbidden"
    "429":
      $ref: "../../../../components/responses.yaml#/RateLimit"
    "500":
      $ref: "../../../../components/responses.yaml#/InternalServerError"
