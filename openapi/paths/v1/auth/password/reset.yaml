post:
  tags: [Auth]
  operationId: resetUserPassword
  summary: |
    [resetUserPassword] Reset user password using token

  security:
    - bearerAuth: []

  parameters:
    - $ref: "../../../../components/parameters.yaml#/RefreshCookie"

  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          required: [oldPassword, newPassword]
          properties:
            oldPassword:
              type: string
              minLength: 8
              maxLength: 128
              example: eyJhbGciOiJIUzI1NiJ9...
            newPassword:
              type: string
              minLength: 8
              maxLength: 128
              example: StrongPassword123

  responses:
    "200":
      description: Password reset successful
      headers:
        x-request-id:
          $ref: "../../../../components/headers.yaml#/RequestID"

    "400":
      $ref: "../../../../components/responses.yaml#/ValidationError"
    "401":
      $ref: "../../../../components/responses.yaml#/Unauthorized"
    "429":
      $ref: "../../../../components/responses.yaml#/RateLimit"
    "500":
      $ref: "../../../../components/responses.yaml#/InternalServerError"
