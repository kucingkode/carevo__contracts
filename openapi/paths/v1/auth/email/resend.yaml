post:
  tags: [Auth]
  operationId: authEmailResend
  summary: |
    [authEmailResend] Resend email verification token
  description: |
    Resend email verification token to the user's email address.
    Previous token will be invalidated and a new one will be issued.

  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          required: [email]
          properties:
            email:
              type: string
              format: email
              example: user@example.com

  responses:
    "200":
      description: Verification email sent
      headers:
        x-request-id:
          $ref: "../../../../components/headers.yaml#/RequestID"
      content:
        application/json:
          schema:
            type: object
            required: [message]
            properties:
              message:
                type: string
                example: If this email is registered and unverified, a new verification link will be sent

    "400":
      description: Validation error
      headers:
        x-request-id:
          $ref: "../../../../components/headers.yaml#/RequestID"
      content:
        application/json:
          schema:
            $ref: "../../../../components/schemas/ValidationErrorResponse.yaml"

    "429":
      description: Too many attempts
      headers:
        x-request-id:
          $ref: "../../../../components/headers.yaml#/RequestID"
      content:
        application/json:
          schema:
            $ref: "../../../../components/schemas/RateLimitErrorResponse.yaml"

    "500":
      description: Internal server error
      headers:
        x-request-id:
          $ref: "../../../../components/headers.yaml#/RequestID"
      content:
        application/json:
          schema:
            $ref: "../../../../components/schemas/RateLimitErrorResponse.yaml"
