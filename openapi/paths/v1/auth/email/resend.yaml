post:
  tags: [Auth]
  operationId: authEmailResend
  summary: |
    [authEmailResend] Resend email verification token
  description: |
    Resend email verification token to the user's email address.
    Previous token will be invalidated and a new one will be issued.

  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          required: [email]
          properties:
            email:
              type: string
              format: email
              maxLength: 255
              example: user@example.com

  responses:
    "200":
      description: Verification email sent
      headers:
        x-request-id:
          $ref: "../../../../components/headers.yaml#/RequestID"

    "400":
      $ref: "../../../../components/responses.yaml#/ValidationError"
    "429":
      $ref: "../../../../components/responses.yaml#/RateLimit"
    "500":
      $ref: "../../../../components/responses.yaml#/InternalServerError"
