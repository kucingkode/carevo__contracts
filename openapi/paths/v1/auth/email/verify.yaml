post:
  tags: [Auth]
  operationId: verifyUserEmail
  summary: |
    [verifyUserEmail] Verify user email address

  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          required: [token]
          properties:
            token:
              type: string
              example: eyJhbGciOiJIUzI1NiJ9...

  responses:
    "200":
      description: Email verified successfully
      headers:
        x-request-id:
          $ref: "../../../../components/headers.yaml#/RequestID"

    "409":
      description: Email already verified
      headers:
        x-request-id:
          $ref: "../../../../components/headers.yaml#/RequestID"
      content:
        application/json:
          schema:
            allOf:
              - $ref: "../../../../components/schemas/ErrorResponse.yaml"
              - properties:
                  error:
                    enum: [EMAIL_ALREADY_VERIFIED]
                    example: EMAIL_ALREADY_VERIFIED
                  message:
                    example: Email is already verified

    "400":
      $ref: "../../../../components/responses.yaml#/ValidationError"
    "401":
      $ref: "../../../../components/responses.yaml#/Unauthorized"
    "429":
      $ref: "../../../../components/responses.yaml#/RateLimit"
    "500":
      $ref: "../../../../components/responses.yaml#/InternalServerError"
