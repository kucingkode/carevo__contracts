post:
  tags: [Auth]
  operationId: registerUser
  summary: |
    [registerUser] Register a new user using email and password

  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          required: [username, email, password]
          properties:
            username:
              type: string
              minLength: 3
              maxLength: 30
              pattern: "^[a-zA-Z0-9_-]{3,30}$"
              example: john_doe
            email:
              type: string
              format: email
              example: user@example.com
            password:
              type: string
              minLength: 8
              maxLength: 128
              example: StrongPassword123
  responses:
    "201":
      description: User registered successfully
      headers:
        x-request-id:
          $ref: "../../../components/headers.yaml#/RequestID"
      content:
        application/json:
          schema:
            type: object
            required: [message]
            properties:
              message:
                type: string
                example: Registration successful, please verify your email

    "409":
      description: Username or email already registered
      headers:
        x-request-id:
          $ref: "../../../components/headers.yaml#/RequestID"
      content:
        application/json:
          schema:
            allOf:
              - $ref: "../../../components/schemas/ErrorResponse.yaml"
              - properties:
                  error:
                    enum: [EMAIL_REGISTERED, USERNAME_TAKEN]
                    example: EMAIL_REGISTERED
                  message:
                    example: Email is already taken

    "400":
      $ref: "../../../components/responses.yaml#/ValidationError"
    "429":
      $ref: "../../../components/responses.yaml#/RateLimit"
    "500":
      $ref: "../../../components/responses.yaml#/InternalServerError"
