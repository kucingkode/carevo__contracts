post:
  tags: [Auth]
  operationId: loginUser
  summary: |
    [loginUser] Login using email and password

  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          required: [email, password]
          properties:
            email:
              type: string
              format: email
              maxLength: 255
              example: user@example.com
            password:
              type: string
              minLength: 8
              maxLength: 128
              example: StrongPassword123

  responses:
    "200":
      description: User logged in successfully
      headers:
        Set-Cookie:
          $ref: "../../../components/headers.yaml#/RefreshCookie"
        x-request-id:
          $ref: "../../../components/headers.yaml#/RequestID"
      content:
        application/json:
          schema:
            type: object
            required: [message]
            properties:
              userId:
                type: string
                format: uuid
                example: 019cda81-ff67-713c-84f6-53ad00c46069
              accessToken:
                type: string
                example: eyJhbGciOiJIUzI1NiJ9...

    "401":
      description: Wrong email or password
      headers:
        x-request-id:
          $ref: "../../../components/headers.yaml#/RequestID"
      content:
        application/json:
          schema:
            allOf:
              - $ref: "../../../components/schemas/ErrorResponse.yaml"
              - properties:
                  error:
                    enum: [INCORRECT_CREDENTIALS]
                    example: INCORRECT_CREDENTIALS
                  message:
                    example: Invalid email or password

    "403":
      description: Email is not verified
      headers:
        x-request-id:
          $ref: "../../../components/headers.yaml#/RequestID"
      content:
        application/json:
          schema:
            allOf:
              - $ref: "../../../components/schemas/ErrorResponse.yaml"
              - properties:
                  error:
                    enum: [EMAIL_NOT_VERIFIED]
                    example: EMAIL_NOT_VERIFIED
                  message:
                    example: Please verify your email before logging in

    "400":
      $ref: "../../../components/responses.yaml#/ValidationError"
    "429":
      $ref: "../../../components/responses.yaml#/RateLimit"
    "500":
      $ref: "../../../components/responses.yaml#/InternalServerError"
