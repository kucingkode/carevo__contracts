patch:
  tags: [Profto]
  operationId: updateUserProfto

  security:
    - bearerAuth: []

  parameters:
    - name: userId
      in: path
      required: true
      schema:
        type: string
        format: uuid
        example: 019cda81-ff67-713c-84f6-53ad00c46069

  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: "../../../../components/schemas/ProftoBase.yaml"

  responses:
    "200":
      description: Profto updated successfully
      headers:
        x-request-id:
          $ref: "../../../../components/headers.yaml#/RequestID"

    "400":
      $ref: "../../../../components/responses.yaml#/ValidationError"
    "401":
      $ref: "../../../../components/responses.yaml#/Unauthorized"
    "403":
      $ref: "../../../../components/responses.yaml#/Forbidden"
    "429":
      $ref: "../../../../components/responses.yaml#/RateLimit"
    "500":
      $ref: "../../../../components/responses.yaml#/InternalServerError"
