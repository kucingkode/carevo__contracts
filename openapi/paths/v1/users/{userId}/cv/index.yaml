get:
  tags: [Cv]
  operationId: getCv

  security:
    - bearerAuth: []

  parameters:
    - name: userId
      in: path
      required: true
      schema:
        type: string
        format: uuid
        example: 019cda81-ff67-713c-84f6-53ad00c46069

  responses:
    "200":
      description: Request successful
      headers:
        x-request-id:
          $ref: "../../../../../components/headers.yaml#/RequestID"
      content:
        application/json:
          schema:
            allOf:
              - $ref: "../../../../../components/schemas/CvBase.yaml"
              - required:
                  - userId
                  - personalInformation
                  - skills
                  - educations
                  - workExperiences
                  - courses
                  - organizations
                  - certifications
                  - updatedAt
                properties:
                  userId:
                    type: string
                    format: uuid
                    example: 019cda81-ff67-713c-84f6-53ad00c46069
                  updatedAt:
                    type: string
                    format: date-time

    "400":
      $ref: "../../../../../components/responses.yaml#/ValidationError"
    "401":
      $ref: "../../../../../components/responses.yaml#/Unauthorized"
    "429":
      $ref: "../../../../../components/responses.yaml#/RateLimit"
    "500":
      $ref: "../../../../../components/responses.yaml#/InternalServerError"

patch:
  tags: [Cv]
  operationId: updateCv

  parameters:
    - name: userId
      in: path
      required: true
      schema:
        type: string
        format: uuid
        example: 019cda81-ff67-713c-84f6-53ad00c46069

  security:
    - bearerAuth: []

  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: "../../../../../components/schemas/CvBase.yaml"

  responses:
    "200":
      description: Request successful
      headers:
        x-request-id:
          $ref: "../../../../../components/headers.yaml#/RequestID"

    "400":
      $ref: "../../../../../components/responses.yaml#/ValidationError"
    "401":
      $ref: "../../../../../components/responses.yaml#/Unauthorized"
    "403":
      $ref: "../../../../../components/responses.yaml#/Forbidden"
    "429":
      $ref: "../../../../../components/responses.yaml#/RateLimit"
    "500":
      $ref: "../../../../../components/responses.yaml#/InternalServerError"
