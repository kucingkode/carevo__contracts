get:
  tags: [Profto]
  operationId: getUserProfto

  security:
    - bearerAuth: []

  parameters:
    - name: username
      in: path
      required: true
      schema:
        type: string
        minLength: 3
        maxLength: 30
        pattern: "^[a-zA-Z0-9_-]{3,30}$"
        example: john_doe

  responses:
    "200":
      description: Request successful
      headers:
        x-request-id:
          $ref: "../../../../../components/headers.yaml#/RequestID"
      content:
        application/json:
          schema:
            allOf:
              - $ref: "../../../../../components/schemas/ProftoBase.yaml"
              - required:
                  - userId
                  - avatarFileId
                  - name
                  - professionRole
                  - lastEducation
                  - email
                  - summary
                  - cvField
                  - certificates
                  - experiences
                  - projects
                  - links
                  - updatedAt
                properties:
                  userId:
                    type: string
                    format: uuid
                    example: 019cda81-ff67-713c-84f6-53ad00c46069
                  updatedAt:
                    type: string
                    format: date-time

    "400":
      $ref: "../../../../../components/responses.yaml#/ValidationError"
    "401":
      $ref: "../../../../../components/responses.yaml#/Unauthorized"
    "404":
      $ref: "../../../../../components/responses.yaml#/NotFound"
    "429":
      $ref: "../../../../../components/responses.yaml#/RateLimit"
    "500":
      $ref: "../../../../../components/responses.yaml#/InternalServerError"
