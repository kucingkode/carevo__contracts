get:
  tags: [Community]
  operationId: getPostsFeed

  security:
    - bearerAuth: []

  responses:
    "200":
      description: Request successful
      headers:
        x-request-id:
          $ref: "../../../components/headers.yaml#/RequestID"
      content:
        application/json:
          schema:
            type: array
            items:
              allOf:
                - $ref: ../../../components/schemas/PostBase.yaml
                - required:
                    [id, userId, communityId, content, totalLikes, createdAt]
                  properties:
                    id:
                      type: string
                      format: uuid
                      example: 019cda81-ff67-713c-84f6-53ad00c46069
                    userId:
                      type: string
                      format: uuid
                      example: 019cda81-ff67-713c-84f6-53ad00c46069
                    totalLikes:
                      type: integer
                      min: 0
                    createdAt:
                      type: string
                      format: date-time

    "400":
      $ref: "../../../components/responses.yaml#/ValidationError"
    "401":
      $ref: "../../../components/responses.yaml#/Unauthorized"
    "429":
      $ref: "../../../components/responses.yaml#/RateLimit"
    "500":
      $ref: "../../../components/responses.yaml#/InternalServerError"
