get:
  tags: [Community]
  operationId: listComments

  security:
    - bearerAuth: []

  parameters:
    - name: postId
      in: path
      required: true
      schema:
        type: string
        format: uuid
        example: 019cda81-ff67-713c-84f6-53ad00c46069
    - name: parentId
      in: query
      required: false
      schema:
        type: string
        format: uuid
        example: 019cda81-ff67-713c-84f6-53ad00c46069

  responses:
    "200":
      description: Request successful
      headers:
        x-request-id:
          $ref: "../../../../../components/headers.yaml#/RequestID"
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: "../../../../../components/schemas/Comment.yaml"

    "400":
      $ref: "../../../../../components/responses.yaml#/ValidationError"
    "401":
      $ref: "../../../../../components/responses.yaml#/Unauthorized"
    "404":
      $ref: "../../../../../components/responses.yaml#/NotFound"
    "429":
      $ref: "../../../../../components/responses.yaml#/RateLimit"
    "500":
      $ref: "../../../../../components/responses.yaml#/InternalServerError"

post:
  tags: [Community]
  operationId: createComment

  security:
    - bearerAuth: []

  parameters:
    - name: postId
      in: path
      required: true
      schema:
        type: string
        format: uuid
        example: 019cda81-ff67-713c-84f6-53ad00c46069

  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          required: [content]
          properties:
            parentId:
              type: string
              format: uuid
              example: 019cda81-ff67-713c-84f6-53ad00c46069
            content:
              type: string
              maxLength: 2000

  responses:
    "201":
      description: Comment created
      headers:
        x-request-id:
          $ref: "../../../../../components/headers.yaml#/RequestID"
      content:
        application/json:
          schema:
            type: object
            required: [commentId, createdAt]
            properties:
              commentId:
                type: string
                format: uuid
              createdAt:
                type: string
                format: date-time

    "400":
      $ref: "../../../../../components/responses.yaml#/ValidationError"
    "401":
      $ref: "../../../../../components/responses.yaml#/Unauthorized"
    "404":
      $ref: "../../../../../components/responses.yaml#/NotFound"
    "429":
      $ref: "../../../../../components/responses.yaml#/RateLimit"
    "500":
      $ref: "../../../../../components/responses.yaml#/InternalServerError"
