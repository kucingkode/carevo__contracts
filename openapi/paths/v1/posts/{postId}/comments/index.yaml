get:
  tags: [Community]
  operationId: listComments

  parameters:
    - name: postId
      in: path
      required: true
      schema:
        type: string
        format: uuid
        example: 019cda81-ff67-713c-84f6-53ad00c46069

post:
  tags: [Community]
  operationId: createComment

  parameters:
    - name: postId
      in: path
      required: true
      schema:
        type: string
        format: uuid
        example: 019cda81-ff67-713c-84f6-53ad00c46069

delete:
  tags: [Community]
  operationId: deleteComments

  parameters:
    - name: postId
      in: path
      required: true
      schema:
        type: string
        format: uuid
        example: 019cda81-ff67-713c-84f6-53ad00c46069
