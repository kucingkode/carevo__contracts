post:
  tags: [File]
  operationId: uploadFile

  security:
    - bearerAuth: []

  requestBody:
    required: true
    content:
      multipart/form-data:
        schema:
          type: object
          required: [file]
          properties:
            file:
              type: string
              format: binary

  responses:
    "201":
      description: File uploaded successfully
      headers:
        x-request-id:
          $ref: "../../../components/headers.yaml#/RequestID"
      content:
        application/json:
          schema:
            type: object
            required: [fileId]
            properties:
              fileId:
                type: string
                format: uuid
                example: 019cda81-ff67-713c-84f6-53ad00c46069

    "400":
      $ref: "../../../components/responses.yaml#/ValidationError"
    "401":
      $ref: "../../../components/responses.yaml#/Unauthorized"
    "429":
      $ref: "../../../components/responses.yaml#/RateLimit"
    "500":
      $ref: "../../../components/responses.yaml#/InternalServerError"
