post:
  tags: [File]
  operationId: uploadFile

  security:
    - bearerAuth: []

  requestBody:
    required: true
    content:
      multipart/form-data:
        schema:
          type: object
          required: [file]
          properties:
            file:
              type: string
              format: binary

  responses:
    "201":
      description: File uploaded successfully
      headers:
        x-request-id:
          $ref: "../../../components/headers.yaml#/RequestID"
      content:
        application/json:
          schema:
            type: object
            required: [fileId]
            properties:
              fileId:
                type: string
                format: uuid
                example: 019cda81-ff67-713c-84f6-53ad00c46069

    "413":
      description: Payload too large
      headers:
        x-request-id:
          $ref: "../../../components/headers.yaml#/RequestID"
      content:
        application/json:
          schema:
            allOf:
              - $ref: "../../../components/schemas/ErrorResponse.yaml"
              - properties:
                  error:
                    enum: [PAYLOAD_TOO_LARGE]
                    example: PAYLOAD_TOO_LARGE
                  message:
                    example: Payload too large

    "507":
      description: Insufficient storage
      headers:
        x-request-id:
          $ref: "../../../components/headers.yaml#/RequestID"
      content:
        application/json:
          schema:
            allOf:
              - $ref: "../../../components/schemas/ErrorResponse.yaml"
              - properties:
                  error:
                    enum: [INSUFFICIENT_STORAGE]
                    example: INSUFFICIENT_STORAGE
                  message:
                    example: Insufficient storage

    "401":
      $ref: "../../../components/responses.yaml#/Unauthorized"
    "429":
      $ref: "../../../components/responses.yaml#/RateLimit"
    "500":
      $ref: "../../../components/responses.yaml#/InternalServerError"
