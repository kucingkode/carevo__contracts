type: object
required: [userId, username, name, avatarFileId]
properties:
  userId:
    type: string
    format: uuid
    example: 019cda81-ff67-713c-84f6-53ad00c46069
  username:
    type: string
    minLength: 3
    maxLength: 30
    pattern: "^[a-zA-Z0-9_-]{3,30}$"
    example: john_doe
  name:
    type: string
    maxLength: 255
  avatarFileId:
    type: string
    format: uuid
    example: 019cda81-ff67-713c-84f6-53ad00c46069
