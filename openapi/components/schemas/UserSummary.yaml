type: object
required:
  - id
  - username
  - name
  - professionRole
  - avatarFileId
properties:
  id:
    type: string
    format: uuid
    example: 019cda81-ff67-713c-84f6-53ad00c46069
  username:
    type: string
    minLength: 3
    maxLength: 30
    pattern: "^[a-zA-Z0-9_-]{3,30}$"
    example: john_doe
  name:
    type: [string, null]
    maxLength: 255
  professionRole:
    type: [string, null]
    format: string
    maxLength: 255
  avatarFileId:
    type: [string, null]
    format: uuid
    example: 019cda81-ff67-713c-84f6-53ad00c46069
