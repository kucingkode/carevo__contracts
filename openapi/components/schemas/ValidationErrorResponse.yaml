type: object
required: [error, message, requestId, fields]
properties:
  error:
    type: string
    enum: [VALIDATION_ERROR]
  message:
    type: string
    example: Request validation failed
  fields:
    type: array
    items:
      type: object
      required: [field, message]
      properties:
        field:
          type: string
          example: email
        message:
          type: string
          example: Must be a valid email address
