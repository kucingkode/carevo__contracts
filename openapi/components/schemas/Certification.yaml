type: object
required:
  - id
  - professionRole
  - thumbnailUrl
  - name
  - redirectUrl
  - publisher
  - createdAt
  - updatedAt
properties:
  id:
    type: string
    format: uuid
    example: 019cda81-ff67-713c-84f6-53ad00c46069
  professionRole:
    type: string
    maxLength: 255
    example: UI/UX Designer
  thumbnailUrl:
    type: string
    format: uuid
    example: 019cda81-ff67-713c-84f6-53ad00c46069
  name:
    type: string
    maxLength: 255
    example: Sertifikasi Cybersecurity
  redirectUrl:
    type: string
    format: uri
    maxLength: 500
    example: https://example.com
  publisher:
    type: string
    maxLength: 255
  createdAt:
    type: string
    format: date-time
