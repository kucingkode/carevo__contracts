name: Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Generate codes
        run: pnpm generate

      - name: Build package
        run: pnpm build

      - name: Push dist to release branch
        run: |
          git config user.email "ci@github.com"
          git config user.name "GitHub Actions"

          # Save dist to a temp location outside the repo
          cp -r dist/ /tmp/dist-output

          # Switch to release branch (create if doesn't exist)
          git checkout -B release

          # Remove everything except .git
          git rm -rf .

          # Copy dist back
          cp -r /tmp/dist-output/* .

          # Copy package.json (npm needs it)
          git checkout ${{ github.ref_name }} -- package.json

          # Commit and push
          git add .
          git commit -m "Release ${{ github.ref_name }}"
          git push origin release --force

          # Move tag to this built commit
          git tag -f ${{ github.ref_name }}
          git push origin ${{ github.ref_name }} --force
